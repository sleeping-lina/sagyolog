<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="作業ログ">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>作業時間計算</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f13;color:#e2e8f0;font-family:-apple-system,'Hiragino Sans',sans-serif;padding:16px 12px 60px;font-size:14px}#app{max-width:540px;margin:0 auto;}
h1{text-align:center;color:#a78bfa;font-size:20px;margin-bottom:4px}
.sub{text-align:center;color:#64748b;font-size:12px;margin-bottom:20px}
.card{background:#18181f;border:1px solid #2e2e3d;border-radius:12px;padding:16px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:700;letter-spacing:.1em;color:#64748b;text-transform:uppercase;margin-bottom:12px}
.tbtn{border:none;border-radius:8px;cursor:pointer;font-weight:600;padding:8px 10px;width:80px;text-align:center;font-size:13px;transition:all .15s}
.tbtn.empty{background:#7c6af7;color:#fff;box-shadow:0 0 8px rgba(124,106,247,.4)}
.tbtn.filled{background:#1a1a2e;border:1px solid #7c6af7;color:#a78bfa;font-family:monospace;font-size:14px;font-weight:700}
.tbtn-edit{width:80px;padding:7px 6px;border-radius:8px;border:1px solid #7c6af7;background:#0f0f13;color:#e2e8f0;font-size:16px;text-align:center;outline:none;font-family:monospace}
.seg-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:nowrap}
.seg-result{font-family:monospace;font-size:13px;color:#fbbf24;min-width:36px}
.del-x{background:none;border:none;color:#64748b;cursor:pointer;font-size:14px;padding:0 2px}
.del-x:hover{color:#f87171}
.proc-box{background:#0f0f13;border:1px solid #2e2e3d;border-radius:8px;padding:10px;margin-bottom:8px}
.proc-head{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.proc-name{flex:1;background:transparent;border:none;border-bottom:1px solid #2e2e3d;color:#e2e8f0;font-size:16px;padding:2px 4px;outline:none;overflow:hidden;resize:none;box-sizing:border-box;}
.proc-name:focus{border-bottom-color:#7c6af7}
.proc-total{font-family:monospace;font-size:12px;color:#34d399;white-space:nowrap}
.proc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.day-box{background:#22222c;border:1px solid #2e2e3d;border-radius:10px;margin-bottom:10px;overflow:hidden}
.day-head{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:4px;padding:9px 10px;background:#1c1c26;border-bottom:1px solid #2e2e3d;}
.day-label{flex:1;color:#fbbf24;font-weight:700;font-size:14px;cursor:pointer;min-width:60px}
.day-label-input{flex:1;background:transparent;border:none;border-bottom:1px solid #7c6af7;color:#fbbf24;font-weight:700;font-size:16px;outline:none}
.day-total{font-family:monospace;font-size:12px;color:#34d399;white-space:nowrap}
.day-body{padding:10px}
.btn{border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;padding:7px 14px;border:none;transition:all .15s}
.btn-primary{background:#7c6af7;color:#fff}
.btn-ghost{background:#22222c;border:1px solid #2e2e3d;color:#94a3b8}
.btn-danger{background:transparent;border:1px solid #3d1f1f;color:#f87171}
.btn-dashed{background:transparent;border:1px dashed #2e2e3d;border-radius:6px;color:#64748b;cursor:pointer;font-size:12px;padding:4px 10px}
.btn-row{display:flex;gap:8px;margin-top:12px}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.sum-box{background:#22222c;border:1px solid #2e2e3d;border-radius:10px;padding:12px;text-align:center}
.sum-box.full{grid-column:1/-1}
.sum-label{font-size:11px;color:#64748b;margin-bottom:4px}
.sum-val{font-family:monospace;font-size:22px;font-weight:700;color:#a78bfa}
.sum-sub{font-size:12px;color:#64748b;margin-top:2px;font-family:monospace}
.output{position:relative;background:#22222c;border:1px solid #2e2e3d;border-radius:8px;padding:12px 14px;margin-top:12px;white-space:pre-wrap;font-family:monospace;font-size:12px;color:#94a3b8;line-height:1.7}
.copy-btn{position:absolute;top:8px;right:8px;background:#18181f;border:1px solid #2e2e3d;border-radius:6px;color:#64748b;cursor:pointer;font-size:11px;padding:3px 10px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab{background:#22222c;border:1px solid #2e2e3d;border-radius:6px;color:#94a3b8;cursor:pointer;font-size:13px;padding:5px 12px}
.tab.active{background:#7c6af7;border-color:#7c6af7;color:#fff}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999}
.modal-box{background:#1c1c26;border:1px solid #2e2e3d;border-radius:12px;padding:22px 24px;max-width:280px;width:90%;text-align:center}
.modal-msg{color:#e2e8f0;font-size:14px;margin-bottom:18px;line-height:1.6}
.modal-btns{display:flex;gap:10px;justify-content:center}
.divhr{border:none;border-top:1px solid #2e2e3d;margin:14px 0}
.chevron-btn{background:transparent;border:1px solid #3a3a50;border-radius:5px;color:#94a3b8;cursor:pointer;font-size:12px;padding:2px 7px;line-height:1.4;transition:all .15s;justify-self:center;align-self:center;display:block;margin:0 auto;}
.chevron-btn:hover{border-color:#7c6af7;color:#a78bfa;}
.undo-btn{background:#22222c;border:1px solid #2e2e3d;border-radius:8px;color:#94a3b8;cursor:pointer;font-size:13px;font-weight:600;padding:7px 10px;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;}
.undo-btn:hover:not(:disabled){border-color:#7c6af7;color:#a78bfa}
.undo-btn:disabled{opacity:0.3;cursor:default}
</style>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="apple-touch-icon.png">
</head>
<body>
<div id="app">
<h1><span style="vertical-align:-5px;color:#a78bfa;display:inline-block;margin-right:1px"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><polyline points="12 9 12 13 14.5 15.5"/><path d="M9 2h6"/><path d="M12 2v3"/></svg></span> 作業時間計算</h1>
<p class="sub">タップで時間記録</p>
<div class="card">
  <div class="card-title">作業ログ</div>
  <div class="tabs" id="workTabs"></div>
  <div id="workBody"></div>
</div>
</div>
<div id="modalArea"></div>
<script>
function nowHHMM(){var d=new Date();return String(d.getHours())+String(d.getMinutes()).padStart(2,'0');}
function parseT(raw,ctxH){
  var s=String(raw).replace(/[^0-9]/g,'');if(!s)return null;
  if(s.length<=2){var m=parseInt(s,10);if(m>59)return null;return{h:ctxH!=null?ctxH:0,m:m};}
  var m=parseInt(s.slice(-2),10),h=parseInt(s.slice(0,-2),10);
  if(m>59)return null;return{h:h,m:m};
}
function diffMin(a,b){
  var s=parseT(a,null);if(!s)return null;
  var es=String(b).replace(/[^0-9]/g,'');
  var e=parseT(b,es.length<=2?s.h:null);if(!e)return null;
  var d=(e.h*60+e.m)-(s.h*60+s.m);if(d<0)d+=1440;return d;
}
function toDisp(raw,ctxH){
  var t=parseT(String(raw).replace(/[^0-9]/g,''),ctxH!=null?ctxH:null);
  if(!t)return null;return t.h+':'+String(t.m).padStart(2,'0');
}
function parseDateStr(raw){
  var s=String(raw).replace(/[^0-9]/g,'');if(s.length<3)return null;
  var mo,d;if(s.length===3){mo=+s[0];d=+s.slice(1);}else{mo=+s.slice(0,2);d=+s.slice(2);}
  if(mo<1||mo>12||d<1||d>31)return null;
  var dt=new Date(new Date().getFullYear(),mo-1,d);
  if(dt.getMonth()!==mo-1)return null;
  return mo+'/'+d+'('+'日月火水木金土'[dt.getDay()]+')';
}
function todayLabel(){var d=new Date();return (d.getMonth()+1)+'/'+d.getDate()+'('+'日月火水木金土'[d.getDay()]+')'}
function hStr(m){return (m/60).toFixed(1)+'h';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showModalWithLabel(msg,okLabel,onOk){
  document.getElementById('modalArea').innerHTML='<div class="modal-bg"><div class="modal-box"><p class="modal-msg">'+esc(msg)+'</p><div class="modal-btns"><button class="btn btn-ghost" onclick="closeModal()">キャンセル</button><button class="btn btn-danger" onclick="_mOk()">'+esc(okLabel)+'</button></div></div></div>';
  window._mOk=function(){closeModal();onOk();};
}
function showModal(msg,onOk){
  document.getElementById('modalArea').innerHTML='<div class="modal-bg"><div class="modal-box"><p class="modal-msg">'+esc(msg)+'</p><div class="modal-btns"><button class="btn btn-ghost" onclick="closeModal()">キャンセル</button><button class="btn btn-danger" onclick="_mOk()">削除する</button></div></div></div>';
  window._mOk=function(){closeModal();onOk();};
}
function closeModal(){document.getElementById('modalArea').innerHTML='';}


function makeTimeCell(getV,setV,getCtx,lbl){
  var w=document.createElement('span');w.style.cssText='display:inline-flex;align-items:center;';
  var btn=document.createElement('button');
  // 編集モード: H input + ':' + MM input
  var inpH=document.createElement('input');  // 時
  var colon=document.createElement('span');
  var inpM=document.createElement('input');  // 分
  [inpH,inpM].forEach(function(i){
    i.inputMode='numeric';i.style.cssText='display:none;background:#0f0f13;border:none;color:#e2e8f0;font-family:monospace;font-size:16px;outline:none;text-align:center;width:36px;padding:6px 2px;';
  });
  colon.textContent=':';colon.style.cssText='display:none;color:#a78bfa;font-size:16px;font-weight:700;padding:0 1px;';
  inpH.maxLength=2;inpM.maxLength=2;

  function dv(){var v=getV();if(!v)return null;return toDisp(v,getCtx())||v;}
  function sb(){
    var v=getV();btn.className=v?'tbtn filled':'tbtn empty';btn.textContent=v?(dv()||v):lbl;
    btn.style.display='';inpH.style.display='none';colon.style.display='none';inpM.style.display='none';
  }
  function si(){
    var v=getV()||'';
    var t=parseT(v,null);
    btn.style.display='none';
    inpH.value=t?String(t.h):'';inpM.value=t?String(t.m).padStart(2,'0'):'';
    inpH.style.display='';colon.style.display='';inpM.style.display='';
    inpH.focus();inpH.select();
  }
  function cm(){
    var h=inpH.value.trim(),m=inpM.value.trim();
    if(h||m){
      var hv=parseInt(h||'0',10),mv=parseInt(m||'0',10);
      if(!isNaN(hv)&&!isNaN(mv)&&mv<60)setV(String(hv)+String(mv).padStart(2,'0'));
    }
    sb();
  }
  btn.addEventListener('touchend',function(e){e.preventDefault();if(!getV()){setV(nowHHMM());sb();}else{si();}});
  btn.onclick=function(){if(!getV()){setV(nowHHMM());sb();}else si();};
  // 時input: Enterや:で分へ移動
  inpH.addEventListener('keydown',function(e){
    if(e.key===':'||e.key==='	'||e.key==='Enter'){e.preventDefault();inpM.focus();inpM.select();}
    if(e.key==='Escape'){sb();}
  });
  inpH.addEventListener('input',function(){
    if(this.value.length>=2){
      var self=this;
      setTimeout(function(){inpM.focus();inpM.select();},10);
    }
  });
  inpM.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();cm();}
    if(e.key==='Escape'){sb();}
    if(e.key==='Backspace'&&this.value===''){inpH.focus();inpH.select();}
  });
  inpH.onblur=function(){
    var _m=inpM;
    setTimeout(function(){if(!_rendering&&document.activeElement!==_m)cm();},80);
  };
  inpM.onblur=function(){if(_rendering)return;if(document.activeElement!==inpH)cm();};
  sb();
  w.appendChild(btn);w.appendChild(inpH);w.appendChild(colon);w.appendChild(inpM);
  return w;
}


var works,aw=0;
function W(){return works[aw];}
var _undoStack=[],_redoStack=[];
function snapshot(){
  _undoStack.push(JSON.stringify({works:works,aw:aw}));
  if(_undoStack.length>30)_undoStack.shift();
  _redoStack=[];
  updateUndoButtons();
}
function undoAction(){
  if(!_undoStack.length)return;
  _redoStack.push(JSON.stringify({works:works,aw:aw}));
  var s=JSON.parse(_undoStack.pop());works=s.works;aw=s.aw;
  saveData();render();
}
function redoAction(){
  if(!_redoStack.length)return;
  _undoStack.push(JSON.stringify({works:works,aw:aw}));
  var s=JSON.parse(_redoStack.pop());works=s.works;aw=s.aw;
  saveData();render();
}
function updateUndoButtons(){
  var ub=document.getElementById('undoBtn'),rb=document.getElementById('redoBtn');
  if(ub)ub.disabled=!_undoStack.length;
  if(rb)rb.disabled=!_redoStack.length;
}
function autoHp(el){
  el.rows=1;
  el.style.height='auto';
  var h=el.scrollHeight;
  if(h>0)el.style.height=h+'px';
}
function saveData(){try{localStorage.setItem('tcData',JSON.stringify({works:works,aw:aw}));}catch(e){}}
function loadData(){
  try{
    var s=localStorage.getItem('tcData');
    if(!s)return false;
    var d=JSON.parse(s);
    if(d&&d.works&&d.works.length){works=d.works;aw=d.aw||0;return true;}
  }catch(e){}
  return false;
}
function exportData(){
  var json=JSON.stringify({version:1,works:works,aw:aw},null,2);
  var d=new Date();
  var fname='sagyolog_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.json';
  try{
    var blob=new Blob([json],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }catch(e){
    showExportModal(json,false);
  }
}
function showExportModal(json,copied){
  var el=document.getElementById('modalArea');
  var inner='<div class="modal-bg"><div class="modal-box" style="max-width:340px;width:95%;text-align:left">';
  if(copied){
    inner+='<p class="modal-msg" style="text-align:center">クリップボードにコピーしました。<br>メモ帳等に貼り付けて<br><b>sagyolog_日付.json</b><br>という名前で保存してください。</p>';
    inner+='<div class="modal-btns"><button class="btn btn-primary" onclick="closeModal()">OK</button></div>';
  }else{
    inner+='<p class="modal-msg" style="text-align:center;margin-bottom:8px">全選択→コピーして<br><b>sagyolog_日付.json</b>で保存</p>';
    inner+='<textarea id="expTa" readonly style="width:100%;height:120px;background:#0f0f13;border:1px solid #2e2e3d;border-radius:6px;color:#94a3b8;font-size:11px;padding:8px;resize:none;box-sizing:border-box;display:block">'+esc(json)+'</textarea>';
    inner+='<div class="modal-btns" style="margin-top:10px"><button class="btn btn-primary" id="expCopyBtn" onclick="var t=document.getElementById(&quot;expTa&quot;);t.select();document.execCommand(&quot;copy&quot;);document.getElementById(&quot;expCopyBtn&quot;).textContent=&quot;✓ コピー済み&quot;">全選択してコピー</button><button class="btn btn-ghost" style="margin-left:8px" onclick="closeModal()">閉じる</button></div>';
  }
  inner+='</div></div>';
  el.innerHTML=inner;
}
function importData(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=function(){
    var file=inp.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var d=JSON.parse(e.target.result);
        if(!d.works||!d.works.length){alert('データが見つかりませんでした');return;}
        d.works.forEach(function(w){
          (w.days||[]).forEach(function(day){
            (day.processes||[]).forEach(function(p){
              if(!p.segments||!p.segments.length)p.segments=[{start:'',end:''}];
              if(!p.name)p.name='作業1';
            });
          });
        });
        showModalWithLabel('現在のデータを上書きしてインポートしますか？','上書きする',function(){
          works=d.works;aw=d.aw||0;saveData();render();
        });
      }catch(ex){alert('ファイルの読み込みに失敗しました');}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function pTotal(p){return p.segments.reduce(function(s,g){var d=(g.start&&g.end)?diffMin(g.start,g.end):null;return s+(d||0);},0);}
function dTotal(day){return day.processes.reduce(function(s,p){return s+pTotal(p);},0);}
function wTotal(){return W().days.reduce(function(s,d){return s+dTotal(d);},0);}
function nSeg(){return{start:'',end:''};}
function nProc(di){
  var n=1;
  if(di!=null&&W()&&W().days[di])n=W().days[di].processes.length+1;
  return{name:'作業'+n,segments:[nSeg()]};
}
function nDay(){return{label:todayLabel(),processes:[nProc()]};}

var _rendering=false;
function render(){
  _rendering=true;
  try{
  saveData();
  // tabs
  var tabs=document.getElementById('workTabs');tabs.innerHTML='';
  works.forEach(function(w,i){
    var b=document.createElement('button');b.className='tab'+(i===aw?' active':'');b.textContent=w.name||'作業ログ'+(i+1);
    (function(i2){b.onclick=function(){aw=i2;render();};})(i);tabs.appendChild(b);
  });
  var ab=document.createElement('button');ab.className='tab';ab.textContent='＋ 作業ログ追加';
  ab.onclick=function(){works.push({name:'作業ログ'+(works.length+1),days:[nDay()]});aw=works.length-1;render();};tabs.appendChild(ab);

  var body=document.getElementById('workBody');body.innerHTML='';
  var work=W();

  var ni=document.createElement('textarea');
  ni.style.cssText='width:100%;background:#22222c;border:1px solid #2e2e3d;border-radius:8px;color:#e2e8f0;font-size:16px;padding:8px 12px;margin-bottom:12px;outline:none;box-sizing:border-box;resize:none;overflow:hidden;line-height:1.5';
  ni.placeholder='作業ログ名を入力';
  ni.value=work.name;
  ni.rows=1;
  function autoH(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
  var _niComp=false;
  ni.addEventListener('compositionstart',function(){_niComp=true;});
  ni.addEventListener('compositionend',function(){
    _niComp=false;
    work.name=this.value||('作業ログ'+(aw+1));
    var t=document.querySelectorAll('.tab');
    if(t[aw])t[aw].textContent=work.name;
    autoH(this);saveData();
  });
  ni.oninput=function(){
    if(_niComp)return;
    work.name=this.value||('作業ログ'+(aw+1));
    var t=document.querySelectorAll('.tab');
    if(t[aw])t[aw].textContent=work.name;
    autoH(this);saveData();
  };
  ni.onblur=function(){
    if(_rendering)return;
    if(_niComp){_niComp=false;this.value=work.name;return;}
    if(!this.value.trim()){
      work.name='作業ログ'+(aw+1);this.value=work.name;
      var t=document.querySelectorAll('.tab');
      if(t[aw])t[aw].textContent=work.name;saveData();
    }
  };
  ni.onfocus=function(){this.select();};
  setTimeout(function(){autoH(ni);},0);
  body.appendChild(ni);

  if(!work.days.length){var ep=document.createElement('p');ep.style.cssText='color:#64748b;font-size:13px;text-align:center;padding:14px';ep.textContent='「日を追加」で作業日を追加してください';body.appendChild(ep);}

  work.days.forEach(function(day,di){
    var dayEl=document.createElement('div');dayEl.className='day-box';
    var head=document.createElement('div');head.className='day-head';

    // 日付: 常にinput表示（iOSでspanクリック→focusが効かないため）
    var lbl=document.createElement('input');lbl.className='day-label-input';
    lbl.style.cssText='width:fit-content;max-width:120px;background:transparent;border:none;color:#fbbf24;font-weight:700;font-size:16px;outline:none;cursor:default;pointer-events:none;user-select:none;';
    lbl.value=day.label||'';lbl.placeholder='日付';lbl.inputMode='numeric';


    var dtEl=document.createElement('span');dtEl.className='day-total';
    var dt=dTotal(day);dtEl.textContent=dt>0?('計'+dt+'分'+(dt>=60?' ('+hStr(dt)+')':'')):'—';

    var ddel=document.createElement('button');ddel.className='del-x';ddel.style.cssText='font-size:13px;border:1px solid #3a3a50;border-radius:5px;padding:2px 5px;background:transparent;color:#64748b;cursor:pointer;transition:all .15s;';;ddel.textContent='✕';
    (function(i,l){ddel.onclick=function(){showModal('「'+(l||'DAY '+(i+1))+'」を削除しますか？',function(){snapshot();work.days.splice(i,1);render();});};})(di,day.label);

    // カレンダー: label[for=id]方式
    // カレンダー: inputをheadに直接置きbuttonで.click()を呼ぶ
    var calInp=document.createElement('input');calInp.type='date';
    calInp.style.cssText='position:absolute;opacity:0;width:0;height:0;font-size:16px;pointer-events:none;';
    // day.labelから日付を逆算してcalInpの初期値を設定
    (function(){
      var yr=new Date().getFullYear();
      var lv=day.label||'';
      var m=lv.match(/^(\d+)\/(\d+)/);
      if(m){
        var mo=parseInt(m[1]),d=parseInt(m[2]);
        calInp.value=yr+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      }else{
        calInp.value=new Date().toISOString().slice(0,10);
      }
    })();
    calInp.addEventListener('change',function(){
      try{
        var v=this.value;if(!v||v.length<8)return;
        var pts=v.split('-');if(pts.length<3)return;
        var y=parseInt(pts[0],10),mo=parseInt(pts[1],10),d=parseInt(pts[2],10);
        if(isNaN(y)||isNaN(mo)||isNaN(d)||mo<1||mo>12||d<1||d>31)return;
        var _dt=new Date(y,mo-1,d);if(isNaN(_dt.getTime()))return;
        var wd='日月火水木金土'[_dt.getDay()];
        day.label=mo+'/'+d+'('+wd+')';lbl.value=day.label;renderSum();saveData();
      }catch(e){}
    });
    // 日付エリア全体（アイコン＋テキスト）をタップでカレンダー起動
    function openCal(){
      var ua=navigator.userAgent;
      var isIOS=/iP(hone|ad|od)/.test(ua)||(ua.includes('Macintosh')&&navigator.maxTouchPoints>1);
      if(isIOS){
        var tmp=document.createElement('label');
        tmp.style.cssText='position:fixed;opacity:0;top:0;left:0;width:1px;height:1px;';
        var tmpInp=document.createElement('input');tmpInp.type='date';
        tmpInp.style.cssText='position:fixed;opacity:0;font-size:16px;';
        // 確定済みの日付をカレンダー初期値に設定
        tmpInp.value=calInp.value;
        function applyDate(v){
          try{
            if(!v||v.length<8)return false;
            var pts=v.split('-');
            if(pts.length<3)return false;
            var y=parseInt(pts[0],10),mo=parseInt(pts[1],10),d=parseInt(pts[2],10);
            if(isNaN(y)||isNaN(mo)||isNaN(d)||mo<1||mo>12||d<1||d>31)return false;
            var _dt=new Date(y,mo-1,d);
            if(isNaN(_dt.getTime()))return false;
            var wd='日月火水木金土'[_dt.getDay()];
            day.label=mo+'/'+d+'('+wd+')';
            calInp.value=v;
            lbl.value=day.label;renderSum();saveData();
            return true;
          }catch(e){return false;}
        }
        tmpInp.addEventListener('change',function(){
          applyDate(this.value);
          if(document.body.contains(tmp))document.body.removeChild(tmp);
        });
        tmpInp.addEventListener('input',function(){applyDate(this.value);});
        tmp.appendChild(tmpInp);
        document.body.appendChild(tmp);
        tmpInp.focus();tmpInp.click();
      } else {
        try{calInp.showPicker();}catch(ex){calInp.click();}
      }
    }
    var calBtn=document.createElement('button');
    calBtn.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';calBtn.type='button';
    calBtn.style.cssText='background:transparent;border:1px solid #3a3a50;border-radius:5px;cursor:pointer;padding:3px 5px;line-height:1;flex-shrink:0;position:relative;width:fit-content;display:inline-flex;align-items:center;color:#94a3b8;transition:border-color .15s;';
    calBtn.appendChild(calInp);
    calBtn.addEventListener('click',function(e){e.stopPropagation();openCal();});
    calBtn.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();openCal();});
    // lbl テキスト部分もタップでカレンダー起動
    // lbl はタップ不可（calBtnのみがカレンダーを開く）
    if(!day.hasOwnProperty('collapsed'))day.collapsed=false;
    var dbody=document.createElement('div');dbody.className='day-body';
    if(day.collapsed)dbody.style.display='none';
    // chevBtnはdbody生成後に作成してdbodyを直接参照
    var chevBtn=document.createElement('button');chevBtn.className='chevron-btn';
    chevBtn.textContent=day.collapsed?'∨':'∧';
    (function(dIdx,btn,bd){
      btn.onclick=function(e){
        e.stopPropagation();
        work.days[dIdx].collapsed=!work.days[dIdx].collapsed;
        btn.textContent=work.days[dIdx].collapsed?'∨':'∧';
        bd.style.display=work.days[dIdx].collapsed?'none':'';
        saveData();
      };
    })(di,chevBtn,dbody);
    // 位置: 📅 → 日付 → ∨/∧ → 合計 → ✕
    // grid: [📅+日付] [∨∧中央] [合計+✕右]
    var leftWrap=document.createElement('span');
    leftWrap.style.cssText='display:flex;align-items:center;gap:4px;min-width:0;overflow:hidden;';
    leftWrap.appendChild(calBtn);leftWrap.appendChild(lbl);
    chevBtn.style.justifySelf='center';
    var rightGrp=document.createElement('span');
    rightGrp.style.cssText='display:flex;align-items:center;gap:6px;justify-content:flex-end;white-space:nowrap;';
    rightGrp.appendChild(dtEl);rightGrp.appendChild(ddel);
    head.appendChild(leftWrap);head.appendChild(chevBtn);head.appendChild(rightGrp);dayEl.appendChild(head);

    day.processes.forEach(function(proc,pi){
      var pbox=document.createElement('div');pbox.className='proc-box';
      var phead=document.createElement('div');phead.className='proc-head';
      var pn=document.createElement('textarea');pn.className='proc-name';
      pn.style.cssText='flex:1;background:transparent;border:none;border-bottom:1px solid #2e2e3d;color:#e2e8f0;font-size:16px;padding:2px 4px;outline:none;overflow:hidden;resize:none;box-sizing:border-box;line-height:1.5;';
      (function(procRef, defName){
        pn.placeholder='作業名を入力';
        pn.value=procRef.name;
        var _pnComp=false;
        pn.addEventListener('compositionstart',function(){_pnComp=true;});
        pn.addEventListener('compositionend',function(){
          _pnComp=false;
          var v=this.value.trim();
          if(v){procRef.name=v;}
          this.value=procRef.name;
          if(typeof autoHp==='function')autoHp(this);
          renderSum();saveData();
        });
        pn.oninput=function(){
          if(_pnComp)return;
          var v=this.value.trim();
          if(v){procRef.name=v;}
          if(typeof autoHp==='function')autoHp(this);
          renderSum();saveData();
        };
        pn.onblur=function(){
          // render中（折りたたみ状態含む）は処理しない
          if(_rendering)return;
          if(_pnComp){
            _pnComp=false;
            this.value=procRef.name;
            return;
          }
          var v=this.value.trim();
          if(!v){
            procRef.name=defName;
            this.value=defName;
          } else {
            procRef.name=v;
          }
          renderSum();saveData();
        };
        pn.onfocus=function(){this.select();};
        setTimeout(function(){
          if(typeof autoHp==='function' && !_rendering && pn.offsetParent!==null){
            autoHp(pn);
          }
        },100);
      })(proc, '作業'+(pi+1));
      var ptEl=document.createElement('span');ptEl.className='proc-total';ptEl.textContent=pTotal(proc)>0?pTotal(proc)+'分':'';
      var pdel=document.createElement('button');pdel.className='del-x';pdel.textContent='✕';
      (function(i,j,n){pdel.onclick=function(){showModal('「'+(n||'この作業')+'」を削除しますか？',function(){snapshot();work.days[i].processes.splice(j,1);render();});};})(di,pi,proc.name);
      (function(i,j){
        var pmup=document.createElement('button');pmup.className='del-x';pmup.textContent='↑';pmup.style.cssText='font-size:11px;border:1px solid #3a3a50;border-radius:5px;padding:2px 6px;background:transparent;color:#64748b;cursor:pointer;transition:all .15s;';
        var pmdw=document.createElement('button');pmdw.className='del-x';pmdw.textContent='↓';pmdw.style.cssText='font-size:11px;border:1px solid #3a3a50;border-radius:5px;padding:2px 6px;background:transparent;color:#64748b;cursor:pointer;transition:all .15s;';
        if(j===0)pmup.style.opacity='0.25';
        if(j===work.days[i].processes.length-1)pmdw.style.opacity='0.25';
        pmup.onclick=function(){if(j>0){snapshot();var t=work.days[i].processes.splice(j,1)[0];work.days[i].processes.splice(j-1,0,t);saveData();render();}};
        pmdw.onclick=function(){if(j<work.days[i].processes.length-1){snapshot();var t=work.days[i].processes.splice(j,1)[0];work.days[i].processes.splice(j+1,0,t);saveData();render();}};
        // ↑↓をpboxの右下に追加（asb の後に）
        pbox._pmup=pmup;pbox._pmdw=pmdw;
      })(di,pi);
      phead.appendChild(pn);phead.appendChild(ptEl);phead.appendChild(pdel);pbox.appendChild(phead);

      proc.segments.forEach(function(seg,si){
        var row=document.createElement('div');row.className='seg-row';
        row.appendChild(makeTimeCell(
          function(){return seg.start;},
          function(v){seg.start=v;updateRow(row,seg,pbox,proc,dtEl,day);},
          function(){return null;},'開始'));
        var ar=document.createElement('span');ar.style.color='#64748b';ar.textContent='→';row.appendChild(ar);
        row.appendChild(makeTimeCell(
          function(){return seg.end;},
          function(v){seg.end=v;updateRow(row,seg,pbox,proc,dtEl,day);},
          function(){var sp=parseT(seg.start,null);var es=String(seg.end).replace(/[^0-9]/g,'');return(sp&&es.length<=2)?sp.h:null;},'終了'));
        var res=document.createElement('span');res.className='seg-result';
        var d2=(seg.start&&seg.end)?diffMin(seg.start,seg.end):null;res.textContent=d2!==null?d2+'分':(seg.start||seg.end?'?':'—');
        row.appendChild(res);
        if(proc.segments.length>1){var sx=document.createElement('button');sx.className='del-x';sx.textContent='✕';(function(i,j,k){sx.onclick=function(){snapshot();work.days[i].processes[j].segments.splice(k,1);render();};})(di,pi,si);row.appendChild(sx);}
        pbox.appendChild(row);
      });

      var asb=document.createElement('button');asb.className='btn-dashed';asb.style.marginTop='4px';asb.textContent='＋ 時間追加';
      (function(i,j){asb.onclick=function(){snapshot();work.days[i].processes[j].segments.push(nSeg());render();};})(di,pi);
      // ＋時間追加と↑↓を同じ行に
      var footRow=document.createElement('div');footRow.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-top:4px;';
      footRow.appendChild(asb);
      var moveGrp=document.createElement('span');moveGrp.style.cssText='display:flex;gap:4px;';
      if(pbox._pmup)moveGrp.appendChild(pbox._pmup);
      if(pbox._pmdw)moveGrp.appendChild(pbox._pmdw);
      footRow.appendChild(moveGrp);
      pbox.appendChild(footRow);
      dbody.appendChild(pbox);
    });

    var apb=document.createElement('button');apb.className='btn btn-ghost';apb.style.marginTop='6px';apb.textContent='＋ 作業追加';
    (function(i){apb.onclick=function(){snapshot();work.days[i].processes.push(nProc(i));render();};})(di);
    dbody.appendChild(apb);
    dayEl.appendChild(dbody);
    body.appendChild(dayEl);
  });

  var br=document.createElement('div');br.className='btn-row';
  var adb=document.createElement('button');adb.className='btn btn-primary';adb.textContent='＋ 日を追加';
  adb.onclick=function(){snapshot();work.days.push(nDay());render();};
  var undoBtn=document.createElement('button');undoBtn.className='undo-btn';undoBtn.id='undoBtn';undoBtn.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>';undoBtn.title='取り消し';undoBtn.disabled=!_undoStack.length;undoBtn.onclick=undoAction;
  var redoBtn=document.createElement('button');redoBtn.className='undo-btn';redoBtn.id='redoBtn';redoBtn.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>';redoBtn.title='やり直し';redoBtn.disabled=!_redoStack.length;redoBtn.onclick=redoAction;
  var dwb=document.createElement('button');dwb.className='btn btn-danger';dwb.textContent='作業ログ削除';
  dwb.onclick=function(){
    showModal('「'+(work.name||'作業ログ'+(aw+1))+'」を削除しますか？',function(){
      snapshot();if(works.length===1){works[0]={name:'作業ログ1',days:[nDay()]};}else{works.splice(aw,1);if(aw>=works.length)aw=works.length-1;}render();
    });
  };
  br.appendChild(adb);br.appendChild(undoBtn);br.appendChild(redoBtn);br.appendChild(dwb);body.appendChild(br);
  renderSum();
  }catch(e){console.error('render:',e);}finally{_rendering=false;}
}

function updateRow(row,seg,pbox,proc,dtEl,day){saveData();
  var res=row.querySelector('.seg-result');
  if(res){var d=(seg.start&&seg.end)?diffMin(seg.start,seg.end):null;res.textContent=d!==null?d+'分':(seg.start||seg.end?'?':'—');}
  var pt=pTotal(proc);
  var ptEl=pbox?pbox.querySelector('.proc-total'):null;
  if(ptEl)ptEl.textContent=pt>0?pt+'分':'';
  var dt=dTotal(day);if(dtEl)dtEl.textContent=dt>0?('計'+dt+'分'+(dt>=60?' ('+hStr(dt)+')':'')):'—';
  renderSum();
}

function renderSum(){
  var body=document.getElementById('workBody');
  if(!body)return;
  var old=body.querySelector('.sa');if(old)old.remove();
  var work=W();if(!work||!work.days||!work.days.length)return;
  var area=document.createElement('div');area.className='sa';
  var hr=document.createElement('hr');hr.className='divhr';area.appendChild(hr);
  var grid=document.createElement('div');grid.className='sum-grid';
  work.days.forEach(function(day,i){
    var dt=dTotal(day);
    var b=document.createElement('div');b.className='sum-box';
    b.innerHTML='<div class="sum-label">'+esc(day.label||'DAY '+(i+1))+'</div><div class="sum-val">'+dt+'<span style="font-size:12px;color:#64748b">分</span></div>'+(dt>=60?'<div class="sum-sub">'+hStr(dt)+'</div>':'');
    grid.appendChild(b);
  });
  var wt=wTotal();
  var wb=document.createElement('div');wb.className='sum-box full';
  wb.innerHTML='<div class="sum-label">合計</div><div class="sum-val" style="font-size:26px">'+wt+'<span style="font-size:12px;color:#64748b">分</span></div>'+(wt>=60?'<div class="sum-sub">'+hStr(wt)+'</div>':'');
  grid.appendChild(wb);area.appendChild(grid);
  var txt=genTxt(work);
  var out=document.createElement('div');out.className='output';out.textContent=txt;
  var cb=document.createElement('button');cb.className='copy-btn';cb.textContent='コピー';
  cb.onclick=function(){navigator.clipboard.writeText(txt).then(function(){cb.textContent='✓ 完了';setTimeout(function(){cb.textContent='コピー';},1500);});};
  out.insertBefore(cb,out.firstChild);area.appendChild(out);
  var br3=document.createElement('div');br3.style.cssText='display:flex;gap:6px;margin-top:10px;flex-wrap:nowrap;';
  var expBtn=document.createElement('button');expBtn.className='btn btn-ghost';expBtn.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span style="margin-left:5px">エクスポート</span>';expBtn.onclick=exportData;expBtn.style.cssText='flex:1;font-size:clamp(10px,3vw,13px);padding:7px 4px;white-space:nowrap;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;background:#1a2535;border-color:#2e4a6e;color:#7ab3ef;';
  var impBtn=document.createElement('button');impBtn.className='btn btn-ghost';impBtn.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span style="margin-left:5px">インポート</span>';impBtn.onclick=importData;impBtn.style.cssText='flex:1;font-size:clamp(10px,3vw,13px);padding:7px 4px;white-space:nowrap;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;background:#1a2535;border-color:#2e4a6e;color:#7ab3ef;';
  var clrBtn=document.createElement('button');clrBtn.className='btn btn-danger';clrBtn.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg><span style="margin-left:5px">クリア</span>';clrBtn.style.cssText='flex:1;font-size:clamp(10px,3vw,13px);padding:7px 4px;white-space:nowrap;overflow:hidden;border-color:#3d1f1f;display:inline-flex;align-items:center;justify-content:center;';
  clrBtn.onclick=function(){
    showModal('すべてのデータをクリアしますか？',function(){
      works=[{name:'作業ログ1',days:[nDay()]}];aw=0;saveData();render();
    });
  };
  br3.appendChild(expBtn);br3.appendChild(impBtn);br3.appendChild(clrBtn);area.appendChild(br3);
  body.appendChild(area);
}


function genTxt(work){
  var lines=[];
  work.days.forEach(function(day){
    lines.push(day.label||'（日付未入力）');
    day.processes.forEach(function(p){
      var segs=p.segments.map(function(g){
        if(!g.start&&!g.end)return null;
        var s=parseT(g.start,null);var es=String(g.end).replace(/[^0-9]/g,'');var e=parseT(g.end,es.length<=2&&s?s.h:null);
        if(!s||!e)return null;return s.h+':'+String(s.m).padStart(2,'0')+'-'+e.h+':'+String(e.m).padStart(2,'0');
      }).filter(Boolean).join(',');
      lines.push((p.name||'（作業名未入力）')+'　'+segs+'('+pTotal(p)+'分)');
    });
    var dt=dTotal(day);lines.push('計'+dt+'分'+(dt>=60?' '+hStr(dt):''));lines.push('');
  });
  var wt=wTotal();lines.push('総計'+wt+'分'+(wt>=60?' '+hStr(wt):''));return lines.join('\n');
}

if(!loadData())works=[{name:'作業ログ1',days:[nDay()]}];
render();
</script>
</body>
